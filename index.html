<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense &amp; Budget Visualizer</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-container">

    <!-- Balance Display -->
    <header class="balance-section">
      <h1>Total Spending</h1>
      <p id="balance-display" class="balance-amount">$0.00</p>
    </header>

    <!-- Input Form -->
    <section class="form-section">
      <h2>Add Expense</h2>
      <form id="expense-form" novalidate>

        <div class="form-group">
          <label for="expense-name">Item Name</label>
          <input
            type="text"
            id="expense-name"
            name="name"
            maxlength="100"
            placeholder="e.g. Lunch"
            autocomplete="off"
          />
          <span class="error-message" id="error-name" aria-live="polite"></span>
        </div>

        <div class="form-group">
          <label for="expense-amount">Amount</label>
          <input
            type="number"
            id="expense-amount"
            name="amount"
            min="0.01"
            max="999999999.99"
            step="0.01"
            placeholder="e.g. 12.50"
          />
          <span class="error-message" id="error-amount" aria-live="polite"></span>
        </div>

        <div class="form-group">
          <label for="expense-category">Category</label>
          <select id="expense-category" name="category">
            <option value="" disabled selected>Select a category</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Fun">Fun</option>
          </select>
          <span class="error-message" id="error-category" aria-live="polite"></span>
        </div>

        <button type="submit" class="btn-submit">Add Transaction</button>

      </form>
    </section>

    <!-- Transaction List -->
    <section class="list-section">
      <h2>Transactions</h2>
      <ul id="transaction-list" class="transaction-list">
        <li class="placeholder-message">No transactions yet</li>
      </ul>
    </section>

    <!-- Pie Chart -->
    <section class="chart-section">
      <h2>Spending by Category</h2>
      <canvas id="expense-chart" width="300" height="300" aria-label="Spending distribution pie chart" role="img"></canvas>
      <p id="chart-placeholder" class="chart-placeholder">No data to display</p>
    </section>

  </div>

  <script src="js/app.js"></script>
</body>
</html>
